global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/rules/circuit-breaker-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [ 'alertmanager:9093' ]


scrape_configs:
  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']